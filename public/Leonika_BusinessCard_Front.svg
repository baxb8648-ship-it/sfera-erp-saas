<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="90mm" height="50mm" viewBox="0 0 90 50">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700');
    </style>
    <clipPath id="card-clip">
      <rect x="0.5" y="0.5" width="89" height="49" rx="3.5" />
    </clipPath>
    <pattern id="stripes" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#F95700" stroke-width="0.35" opacity="0.25" />
    </pattern>
  </defs>
  
  <!-- Rounded Card Base -->
  <rect x="0.5" y="0.5" width="89" height="49" rx="3.5" fill="#0F0F11" stroke="rgba(255, 255, 255, 0.05)" stroke-width="0.5" />
  
  <!-- Diagonal stripes pattern top-right -->
  <rect x="69.5" y="0.5" width="20" height="20" fill="url(#stripes)" clip-path="url(#card-clip)" />
  
  <!-- Subtle line styling -->
  <line x1="7" y1="34" x2="83" y2="34" stroke="rgba(255,255,255,0.06)" stroke-width="0.2" />
  
  <!-- Logo Header -->
  <text x="8" y="11" font-family="Montserrat, sans-serif" font-weight="900" font-size="4.8" fill="#ffffff" letter-spacing="-0.2">ЛЕОНИКА</text>
  <text x="8" y="14.5" font-family="Inter, sans-serif" font-weight="700" font-size="1.4" fill="#F95700" letter-spacing="0.8">ПРОМЫШЛЕННАЯ ГРУППА</text>
  
  <!-- Badge -->
  <rect x="66" y="6" width="17" height="3.5" fill="#F95700" fill-opacity="0.1" stroke="#F95700" stroke-opacity="0.4" stroke-width="0.25" />
  <text x="74.5" y="7.75" font-family="Inter, sans-serif" font-weight="700" font-size="1.1" fill="#ffffff" letter-spacing="0.2" text-anchor="middle" dominant-baseline="central">АКЗ • ИЗОЛЯЦИЯ</text>
  
  <!-- Legal details -->
  <circle cx="8" cy="22.2" r="0.45" fill="#F95700" />
  <text x="10" y="22.7" font-family="Inter, sans-serif" font-weight="700" font-size="1.5" fill="#a1a1aa" letter-spacing="0.4">ООО "ЛЕОНИКА"</text>
  <text x="8" y="27.8" font-family="Montserrat, sans-serif" font-weight="900" font-size="2.8" fill="#ffffff" letter-spacing="-0.1">ПРОМЫШЛЕННАЯ ЗАЩИТА И ИЗОЛЯЦИЯ</text>
  
  <!-- Footer contacts -->
  <!-- Left Column: Phones with icons -->
  <g transform="translate(8, 36.5)">
    <g transform="scale(0.09)" stroke="#F95700" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </g>
    <text x="3.0" y="1.8" font-family="Inter, sans-serif" font-weight="700" font-size="1.8" fill="#ffffff" letter-spacing="0.1">+7 (963) 600-63-46</text>
  </g>
  
  <g transform="translate(8, 41.0)">
    <g transform="scale(0.09)" stroke="#F95700" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
    </g>
    <text x="3.0" y="1.8" font-family="Inter, sans-serif" font-weight="700" font-size="1.8" fill="#ffffff" letter-spacing="0.1">+7 (987) 341-21-39</text>
  </g>
  
  <!-- Right Column: Web with Globe icon & Email -->
  <g transform="translate(61, 36.5)">
    <g transform="scale(0.09)" stroke="#F95700" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      <path d="M2 12h20"/>
    </g>
    <text x="3.0" y="1.8" font-family="Inter, sans-serif" font-weight="700" font-size="1.8" fill="#ffffff" letter-spacing="0.8">ЛЕОНИКА56.РФ</text>
  </g>
  
  <text x="64.0" y="42.8" font-family="Inter, sans-serif" font-weight="700" font-size="1.3" fill="#a1a1aa" letter-spacing="0.2" text-anchor="start">LEONIKARUS.MSK@GMAIL.COM</text>
  
  <!-- Accent orange bar clipped to rounded corner -->
  <rect x="0.5" y="47.5" width="89" height="2" fill="#F95700" clip-path="url(#card-clip)" />
</svg>
