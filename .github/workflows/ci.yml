name: SFERA ERP SaaS CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-build:
    name: Frontend TypeCheck & Build (Vite/React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Verify TypeScript & Build Frontend Bundle
        run: npm run build
        env:
          VITE_API_URL: https://api.sfera-erp.ru

  backend-check:
    name: Backend Syntax & Module Check (FastAPI/Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile & Verify Python Code Syntax
        working-directory: ./backend
        run: |
          python -m compileall app
